global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Blackbox exporter metrics endpoint
  - job_name: "blackbox_exporter"
    static_configs:
      - targets: ["blackbox:9115"]

  # ICMP ping probes — device reachability
  - job_name: "icmp_ping"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 192.168.139.1    # Firewalla
          - 192.168.139.2    # RT6600ax
          - 192.168.139.3    # MR2200ac
          - 192.168.139.8    # pve
          - 192.168.139.7    # pve2
          - 192.168.139.12   # NAS
          - 192.168.139.13   # Home Assistant
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # HTTP 200 probes — service health
  - job_name: "http_probe"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://192.168.139.13:8123  # Home Assistant
          - http://grafana:3000         # Grafana (Docker DNS)
          - http://loki:3100/ready      # Loki readiness (Docker DNS)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # node_exporter — host-level metrics for Proxmox nodes
  - job_name: "node"
    static_configs:
      - targets:
          - 192.168.139.8:9100   # pve
          - 192.168.139.7:9100   # pve2
