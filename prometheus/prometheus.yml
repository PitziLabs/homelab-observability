global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Blackbox exporter metrics endpoint
  - job_name: "blackbox_exporter"
    static_configs:
      - targets: ["blackbox:9115"]

  # ICMP ping probes — device reachability
  - job_name: "icmp_ping"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 192.168.139.1      # firewalla
          - 192.168.139.86     # ap-office (RT6600ax)
          - 192.168.139.8      # pve
          - 192.168.139.7      # pve2
          - 192.168.139.203    # pluto (NAS)
          - 192.168.139.172    # homeassistant
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # HTTP 200 probes — service health
  - job_name: "http_probe"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://192.168.139.172:8123  # Home Assistant
          - http://grafana:3000         # Grafana (Docker DNS)
          - http://loki:3100/ready      # Loki readiness (Docker DNS)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # --- Home Assistant entity metrics ---
  - job_name: "homeassistant"
    scrape_interval: 60s
    metrics_path: /api/prometheus
    bearer_token_file: /etc/prometheus/ha_token
    static_configs:
      - targets: ["192.168.139.172:8123"]

  # node_exporter — host-level metrics for Proxmox nodes
  - job_name: "node"
    static_configs:
      - targets:
          - 192.168.139.8:9100   # pve
          - 192.168.139.7:9100   # pve2
